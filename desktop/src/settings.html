<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="modules/connection-csp.js"></script>
    <title>颉AI · 设置</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="themes/warm-paper.css" id="themeSheet">
    <style>
        /* 绐楀彛绾ц鐩栵細settings-panel 濉弧鏁翠釜绐楀彛 */
        body {
            --paper-texture-attachment: scroll;
            background-color: var(--bg);
            overflow: hidden;
        }
        body.paper-texture {
            background-attachment: scroll;
        }
        .settings-panel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            border-radius: 0;
            box-shadow: none;
            border: none;
            transform: none;
            z-index: 1;
            padding-top: 0;
        }
        .settings-header {
            -webkit-app-region: drag;
            padding: 36px 0 var(--space-md, 12px) 20px;
        }
        .settings-header button,
        .settings-header input,
        .settings-header select,
        .settings-header textarea {
            -webkit-app-region: no-drag;
        }
        /* 闅愯棌杩斿洖鎸夐挳锛堢獥鍙ｆ湁鑷繁鐨勫叧闂寜閽級 */
        .settings-back-btn { display: none; }
        /* Windows/Linux锛氶€忔槑鏍囬鏍忚鐩栧眰锛屽彧涓烘壙杞?window controls 娉ㄥ叆鐐?*/
        .titlebar-minimal {
            background: transparent !important;
            background-image: none !important;
            border-bottom: none;
            z-index: 100;
        }
        /* Windows/Linux锛歴ettings-panel 椤堕儴璁╁嚭 titlebar 楂樺害锛岄伩鍏?drag 鍖哄煙鍐茬獊 */
        html[data-platform="win32"] .settings-panel,
        html[data-platform="linux"] .settings-panel {
            top: 38px;
        }
        html[data-platform="win32"] .settings-header,
        html[data-platform="linux"] .settings-header {
            padding-top: 10px;
        }
        html[data-platform="win32"] .titlebar-minimal,
        html[data-platform="linux"] .titlebar-minimal {
            pointer-events: auto;
            height: 38px;
        }
        /* 鍔犺浇钂欑増 */
        .settings-loading-mask {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: var(--bg);
            transition: opacity 0.25s ease;
        }
        body.paper-texture .settings-loading-mask {
            background-image: url(./assets/textures/rice-paper.png);
            background-repeat: repeat;
            background-size: 160px;
        }
        .settings-loading-mask.fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="react-root"></div>
    <!-- Windows/Linux 鑷粯绐楀彛鎺у埗鎸夐挳娉ㄥ叆鐐癸細蹇呴』鍦?react-root 涔嬪悗锛屽惁鍒欒 React 娓叉煋灞傞伄钄?-->
    <div class="titlebar titlebar-minimal"></div>

    <script src="lib/i18n.js"></script>
    <script src="lib/theme.js"></script>
    <script src="modules/platform.js"></script>
    <script type="module" src="./settings-main.tsx"></script>
</body>
</html>
