name: 颉AI macOS Build (Unsigned)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - 'server/**'
      - 'shared/**'
      - 'core/**'
      - 'lib/**'
      - 'hub/**'
      - 'plugins/**'
      - 'skills2set/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/yijie-macos-build.yml'

jobs:
  macos-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            label: Apple-Silicon
          - arch: x64
            label: Intel

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npm run build:packages

      - name: Build client bundles
        run: npm run build:client

      - name: Build server bundle
        shell: bash
        run: node scripts/build-server.mjs darwin ${{ matrix.arch }}

      - name: Build Computer Use helper
        shell: bash
        run: |
          HANA_COMPUTER_USE_HELPER_ARCH=${{ matrix.arch }} node scripts/build-computer-use-helper.mjs ${{ matrix.arch }}

      - name: Package macOS (unsigned DMG)
        shell: bash
        run: |
          ulimit -n 65536
          npx electron-builder --mac dmg zip --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 颉AI-macOS-${{ matrix.label }}
          retention-days: 30
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

      - name: Debug - list dist
        if: failure()
        run: |
          echo "=== dist/ ==="
          ls -la dist/ || echo "dist/ not found"
          echo "=== dist-server/ ==="
          ls -la dist-server/ || echo "dist-server/ not found"
          echo "=== dist-computer-use/ ==="
          ls -la dist-computer-use/ || echo "dist-computer-use/ not found"
          echo "=== dist-main/ ==="
          ls -la dist-main/ || echo "dist-main/ not found"
          echo "=== dist-renderer/ ==="
          ls -la dist-renderer/ || echo "dist-renderer/ not found"
